<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images of India</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f4f4f4;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem; 
            max-width: 500px;
            padding: 20px;
        }

        h1, p, a {
            margin: 0 !important;
            padding: 0 !important;
            display: block;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 1.3rem;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.6;
            line-height: 1.6;
        }

        .link {
            color: #f4f4f4;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            width: fit-content;
            margin: 1rem auto 0 !important; 
            transition: border-color 0.3s ease;
        }

        .link:hover {
            border-bottom-color: #f4f4f4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Images of India</h1>
        <p>A curated collection of wildlife and landscapes from across the subcontinent. Coming soon.</p>
        <a href="https://jamesgodber.com" class="link">jamesgodber.com</a>
    </div>

</body>
</html>
